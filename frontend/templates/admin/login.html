<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Fundación FEM</title>
    
    <!-- Meta tags basicos -->
    <meta name="color-scheme" content="light">

    <!-- Tipografías -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Estilo principal del sistema de diseno -->
    <link rel="stylesheet" href="{{ url_for('static', path='css/main.css') }}?v=1.0.5">

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--color-bg-alt);
            font-family: var(--font-sans);
            color: var(--color-text);
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: var(--space-md);
        }

        .login-card {
            background: var(--color-white);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--space-xl);
            box-shadow: var(--shadow-premium);
            display: flex;
            flex-direction: column;
            gap: var(--space-lg);
        }

        .login-header {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: var(--space-xxs);
        }

        .login-header h1 {
            font-family: var(--font-brand-condensed);
            font-size: 1.8rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--color-primary);
        }

        .login-header p {
            font-size: 0.9rem;
            color: var(--color-text-muted);
            margin: 0;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: var(--space-xxs);
            margin-bottom: var(--space-md);
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 550;
            color: var(--color-text);
        }

        .form-control {
            padding: var(--space-sm) var(--space-md);
            font-size: 0.9rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-family: var(--font-sans);
            transition: var(--transition-smooth);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(12, 30, 54, 0.15);
        }

        .btn-login {
            background-color: var(--color-primary);
            color: var(--color-white);
            font-weight: 600;
            font-size: 0.95rem;
            padding: var(--space-sm);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            width: 100%;
            transition: var(--transition-smooth);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: var(--space-xs);
        }

        .btn-login:hover {
            background-color: var(--color-primary-hover);
        }

        .alert-error {
            background-color: #fee2e2;
            color: var(--color-rojo-ladrillo);
            border-left: 4px solid var(--color-rojo-ladrillo);
            padding: var(--space-sm);
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            text-align: center;
        }

        .back-link {
            text-align: center;
            font-size: 0.85rem;
            margin-top: var(--space-xs);
        }

        .back-link a {
            color: var(--color-celeste);
            text-decoration: none;
            font-weight: 550;
            transition: var(--transition-smooth);
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <h1>Fundación FEM</h1>
                <p>Ingreso a la Intranet Administrativa</p>
            </div>

            {% if error %}
            <div class="alert-error">
                {{ error }}
            </div>
            {% endif %}

            <form action="/admin/auth/login" method="POST">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="Escribe tu usuario" value="{{ username or '' }}" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Escribe tu contraseña" required>
                </div>

                <button type="submit" class="btn-login">Iniciar Sesión</button>
            </form>

            <div class="back-link">
                <a href="/">← Volver al sitio institucional</a>
            </div>
        </div>
    </div>
</body>
</html>
